name: docker

# GHCR semver image tag is v$(cat VERSION) on each non-PR publish (main branch / workflow_dispatch).
# Also publishes latest, branch ref, sha. Bump VERSION + push main — see README and scripts/set-version.sh

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      hermes_ref:
        description: Hermes git ref to build (branch or tag)
        required: false
        default: main
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Pin upstream Hermes ref for reproducible layers + better cache hits (override via workflow_dispatch).
  HERMES_REF: ${{ inputs.hermes_ref || 'main' }}

jobs:
  build-amd64:
    name: build (linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            HERMES_REF=${{ env.HERMES_REF }}
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,push-by-digest=true,name-canonical=true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cache-from: |
            type=gha,scope=linux-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64
          cache-to: |
            type=gha,scope=linux-amd64,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64,mode=max

  build-arm64:
    name: build (linux/arm64)
    # Skip arm64 on PRs — halves CI time; main still publishes multi-arch.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            HERMES_REF=${{ env.HERMES_REF }}
          platforms: linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,push-by-digest=true,name-canonical=true
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cache-from: |
            type=gha,scope=linux-arm64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-to: |
            type=gha,scope=linux-arm64,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64,mode=max

  merge:
    name: merge manifest
    needs: [build-amd64, build-arm64]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Read VERSION file
        id: version
        run: |
          set -euo pipefail
          test -f VERSION || { echo '::error title=VERSION::VERSION missing in repo root'; exit 1; }
          line=$(grep -Ev '^\s*(#|$)' VERSION | head -1 | tr -d ' \t\r\n')
          [ -n "$line" ] || { echo '::error title=VERSION::VERSION must contain semver (first non-comment line)'; exit 1; }
          line="${line#v}"
          case "$line" in
            *.*.*) ;;
            *) echo "::error title=VERSION::$line is not semver major.minor.patch" >&2; exit 1 ;;
          esac
          echo "semver=$line" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ steps.version.outputs.semver }}

      - name: Create and push multi-arch manifest
        run: |
          set -euo pipefail
          tags="${{ steps.meta.outputs.tags }}"
          # metadata-action joins tags with newlines; imagetools wants -t per tag.
          args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            args+=(-t "$tag")
          done <<< "$tags"
          # build-push-action digest outputs are full refs (repo@sha256:...).
          docker buildx imagetools create "${args[@]}" \
            "${{ needs.build-amd64.outputs.digest }}" \
            "${{ needs.build-arm64.outputs.digest }}"
