name: docker

# GHCR semver image tag is v$(cat VERSION) on each non-PR publish (main branch / workflow_dispatch).
# Also publishes latest, branch ref, sha. Bump VERSION + push main — see README and scripts/set-version.sh

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      hermes_ref:
        description: Hermes git ref to build (branch or tag)
        required: false
        default: main
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read VERSION file
        id: version
        run: |
          set -euo pipefail
          test -f VERSION || { echo '::error title=VERSION::VERSION missing in repo root'; exit 1; }
          line=$(grep -Ev '^\s*(#|$)' VERSION | head -1 | tr -d ' \t\r\n')
          [ -n "$line" ] || { echo '::error title=VERSION::VERSION must contain semver (first non-comment line)'; exit 1; }
          line="${line#v}"
          case "$line" in
            *.*.*) ;;
            *) echo "::error title=VERSION::$line is not semver major.minor.patch" >&2; exit 1 ;;
          esac
          echo "semver=$line" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ steps.version.outputs.semver }},enable=${{ github.event_name != 'pull_request' }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            HERMES_REF=${{ inputs.hermes_ref || 'main' }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
